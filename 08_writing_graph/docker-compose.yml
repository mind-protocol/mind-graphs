services:
  falkordb:
    image: falkordb/falkordb-server:latest
    container_name: hir-writing-falkordb
    ports:
      - "6379:6379"
    environment:
      REDIS_ARGS: "--appendonly yes"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  falkordb_data:
